# fly.toml app configuration file generated for flyweight-backend on 2024-09-13T18:14:57-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'flyweight-backend'
primary_region = 'sjc'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  release_command = './bin/rails db:prepare'

[processes]
  app = './bin/rails server'

[http_service]
  internal_port = 3000
  # Keep one machine always-on: anycable-go reaches this app over HTTP RPC
  # (flyweight-backend.flycast/_anycable) to authenticate every WebSocket
  # connect/subscribe. A suspended backend can't answer that RPC in time, so
  # sockets would fail to connect.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[checks]
  [checks.status]
    port = 3000
    type = 'http'
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [checks.status.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[metrics]
  port = 3000
  path = '/metrics'

[[statics]]
  guest_path = '/rails/public'
  url_prefix = '/'
